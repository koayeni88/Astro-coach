<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a2e"/>
      <stop offset="100%" style="stop-color:#1a0e3e"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.4"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.25"/>
  <!-- Star burst -->
  <polygon points="256,100 278,200 370,170 300,230 380,300 278,270 256,380 234,270 132,300 212,230 142,170 234,200" fill="url(#star)" opacity="0.9"/>
  <!-- Center dot -->
  <circle cx="256" cy="240" r="20" fill="#e9d5ff"/>
  <!-- Small stars -->
  <circle cx="160" cy="120" r="3" fill="#e9d5ff" opacity="0.7"/>
  <circle cx="380" cy="140" r="2.5" fill="#e9d5ff" opacity="0.6"/>
  <circle cx="120" cy="350" r="2" fill="#e9d5ff" opacity="0.5"/>
  <circle cx="400" cy="380" r="3" fill="#e9d5ff" opacity="0.6"/>
  <circle cx="320" cy="420" r="2" fill="#e9d5ff" opacity="0.4"/>
  <!-- Text -->
  <text x="256" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="48" fill="#e9d5ff" letter-spacing="4">ASTRO</text>
</svg>
